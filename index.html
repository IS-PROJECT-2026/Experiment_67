<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 67 Team</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f7fb;
            color: #333;
        }

        header {
            background: #0d6efd;
            color: white;
            text-align: center;
            padding: 40px;
        }

        nav {
            background: #083d91;
            text-align: center;
            padding: 12px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        .container {
            width: 80%;
            margin: auto;
            padding: 30px 0;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
        }

        .members {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .member {
            flex: 1;
            background: #eaf2ff;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        footer {
            background: #0d6efd;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }

        button {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #084298;
        }
    </style>
</head>

</body>
</html>
